<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login - NexaAnalytics</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="navbar">
  <div class="logo">NexaAnalytics</div>
  <div class="nav-links">
    <a href="index.html">Home</a>
  </div>
</nav>
  <section class="auth-page">
  <div class="auth-container">

    <h1>Login to Your Account</h1>

    <form class="auth-form" onsubmit="return loginUser()">
      
      <input type="text" id="loginEmail" placeholder="Email or Phone Number" required>
      
      <input type="password" id="loginPass" placeholder="Password" required>
      
      <button type="submit">Login</button>

    </form>

    <p id="message" class="error-msg"></p>

    <p class="switch-text">
      Don't have an account? <a href="signup.html">Sign Up</a>
    </p>

  </div>

  <script>
    function loginUser() {
      const enteredEmail = document.getElementById("loginEmail").value;
      const enteredPass = document.getElementById("loginPass").value;

      const savedEmail = localStorage.getItem("userEmail");
      const savedPass = localStorage.getItem("userPass");

      if (enteredEmail === savedEmail && enteredPass === savedPass) {
        alert("Login Successful!");
        window.location.href = "index.html";
      } else {
        document.getElementById("message").textContent = "Invalid credentials!";
      }

      return false;
    }
  </script>
</section>
</body>
</html>
